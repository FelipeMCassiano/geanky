name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
    # Aqui é a mágica: Ele escolhe o sistema operacional nativo para compilar!
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux (Intel/AMD)
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            output: geanky-linux-amd64
          # macOS (Apple Silicon / M1, M2, etc)
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            output: geanky-darwin-arm64
          # macOS (Intel)
          - runner: macos-13
            goos: darwin
            goarch: amd64
            output: geanky-darwin-amd64
          # Windows (Intel/AMD)
          - runner: windows-latest
            goos: windows
            goarch: amd64
            output: geanky-windows-amd64.exe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # É sempre bom garantir uma versão recente

      - name: Build Executable
        env:
          CGO_ENABLED: 1 # Força o CGO a ficar ligado!
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -o bin/${{ matrix.output }} .
        # Usamos o bash para garantir que comandos como 'mkdir' e barras '/' funcionem no Windows
        shell: bash 

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: bin/${{ matrix.output }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
