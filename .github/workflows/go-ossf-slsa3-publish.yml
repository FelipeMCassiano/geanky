name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            output: geanky-linux-amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            output: geanky-darwin-arm64
          - runner: macos-13
            goos: darwin
            goarch: amd64
            output: geanky-darwin-amd64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            output: geanky-windows-amd64.exe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # PASSO NOVO: Garante que o compilador C (MinGW/GCC) está instalado no Windows
      - name: Setup GCC Compiler (Windows Only)
        if: matrix.goos == 'windows'
        run: choco install mingw -y
        shell: bash

      # Mudei para adicionar '-v' (verbose). Isso evita que o GitHub cancele por "inatividade" visual.
      - name: Build Executable
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          echo "Iniciando compilação (isso pode demorar por causa do Tree-sitter)..."
          go build -v -o bin/${{ matrix.output }} .
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: bin/${{ matrix.output }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
