name: Build and Release

on:
  push:
    tags:
      - 'v*' # O workflow será disparado apenas quando você criar uma tag (ex: v1.0.0)

permissions:
  contents: write # Necessário para permitir que a Action crie a Release no repositório

jobs:
  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            arch: amd64
            output: geanky-linux-amd64
          - os: linux
            arch: arm64
            output: geanky-linux-arm64
          # macOS
          - os: darwin
            arch: amd64
            output: geanky-darwin-amd64
          - os: darwin
            arch: arm64
            output: geanky-darwin-arm64
          # Windows
          - os: windows
            arch: amd64
            output: geanky-windows-amd64.exe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # Altere se estiver usando uma versão diferente do Go

      - name: Build Executable
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p bin
          go build -o bin/${{ matrix.output }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: bin/${{ matrix.output }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
